paths:
  model: "configs/model.yaml"
  samples: "configs/samples.yaml"
  system_prompt: "configs/system_prompt.txt"  
  courses: "configs/courses.yaml"
  locations: "configs/locations.yaml"
  teachers: "configs/teachers.yaml"
  examples: "configs/examples.yaml"
  
uvicorn:
  host: "0.0.0.0"
  port: 8000
  reload: False
  workers: 1
  log_level: "info"

api_keys:
  - "apikey1" # Поменять на свой ключ в Проде

cors:
  allow_origins:
    - "*"   # или список доменов, например https://it-schools.org/ https://s-it-schools.org/
    
# Конфигурация HippoRAG2 RAG системы
hipporag:
  save_dir: "outputs/hipporag"
  llm_model_name: null  # Заполнить при использовании OpenAI (например, "gpt-4o-mini")
  llm_base_url: null    # URL для локального vLLM сервера (например, "http://localhost:8000/v1")
  embedding_model_name: "nvidia/NV-Embed-v2"  # Модель эмбеддингов
  embedding_base_url: null  # URL для embedding endpoint (опционально)
  auto_index: true  # Автоматически индексировать документы из configs при запуске